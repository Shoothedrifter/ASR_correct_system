name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Sets Vite's base to /<repo-name>/ automatically — works for any project repo.
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          # Backend WebSocket URL stored as a GitHub Actions secret.
          # Go to: Settings → Secrets and variables → Actions → New repository secret
          # Name: VITE_WS_BASE   Value: wss://your-backend.onrender.com
          VITE_WS_BASE: ${{ secrets.VITE_WS_BASE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
